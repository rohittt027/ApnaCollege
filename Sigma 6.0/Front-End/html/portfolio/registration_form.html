<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form in HTML</title>
</head>

<body>
    <h4>Registration Form</h4>
    <form action="/action.php">
        <input type="text" placeholder="username">
        <br><br>
        <input type="text" placeholder="password">
        <br><br>
        <h5>Select your class</h5>
        <label for="101">
            <input type="radio" value="XI" name="XI" id="101">Class XI
        </label>
        <br><br>
        <label for="102">
            <input type="radio" value="XII" name="XII" id="102">Class XII
        </label>
        <br><br>
        <h5>Select fav subjects</h5>
        <label for="math">
            <input type="checkbox" value="math" name="subject" id="101">Math
        </label>
        <br><br>
        <label for="phy">
            <input type="checkbox" value="phy" name="subject" id="102">Physics
        </label>
        <br><br>
        <label for="chem">
            <input type="checkbox" value="chem" name="subject" id="103">Chemistry
        </label>
        <br><br>
        <label for="CS">
            <input type="checkbox" value="CS" name="subject" id="104">Computer Science
        </label>
        <br><br>
        <label for="Eng">
            <input type="checkbox" value="Eng" name="subject" id="105">English
        </label>
        <br><br>
        Select your city
        <select name="city" id="101">
            <option value="Delhi">Delhi</option>
            <option value="Mumbai">Mumbai</option>
            <option value="Kolkata">Kolkata</option>
            <option value="Punjab">Punjab</option>
            <option value="Banglore">Banglore</option>
        </select>
        <br><br>
        <textarea name="feedback" id="101" placeholder="please give your valuable feedback here!" rows="5"></textarea>
        <br><br>
        <input type="submit" value="submit">
        
    </form>
</body>

</html>
