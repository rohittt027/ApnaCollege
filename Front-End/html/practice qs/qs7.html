<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h3>Registration Form</h3>
    <form action="/server">
        <div>
            <input type="text" name="name" id="Fname" placeholder="First Name">
            <input type="text" name="name" id="Lname" placeholder="Last Name">
        </div>
        <div>
            <label for="gender">Please select your gender:</label>
            <select name="gender" id="gender">
                <option value="m">Male</option>
                <option value="f">Female</option>
                <option value="o">Others</option>
            </select>
        </div>

        <div>
            Do you agree to all terms of services?
            <input type="checkbox" name="terms" id="terms">
            <label for="terms">Yes,I agree</label>
        </div>
        <button>Register</button>
    </form>

</body>

</html>
